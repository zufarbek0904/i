<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Анимированное Canvas Сердце</title>
    <style>
        /* Стили из твоего запроса */
        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
        } 
        body { 
            background: #000; 
            overflow: hidden; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
        } 
        canvas { 
            display: block; 
        }
    </style>
</head>
<body>

    <!-- Добавляем холст с нужным ID -->
    <canvas id="c"></canvas>

    <script>
        const canvas = document.getElementById("c"); 
        const ctx = canvas.getContext("2d"); 

        canvas.width = window.innerWidth; 
        canvas.height = window.innerHeight; 

        let angle = 0; 
        const NUM_STEPS = 80; // Немного увеличил для более плотного контура
        const SCALE = 13;     // Оптимальный масштаб для читаемости текста
        const TEXT = "I love you"; 

        // Математические формулы сердца
        function heartX(t) { 
            return 16 * Math.pow(Math.sin(t), 3); 
        } 

        function heartY(t) { 
            return 13 * Math.cos(t) - 5 * Math.cos(2 * t) - 2 * Math.cos(3 * t) - Math.cos(4 * t); 
        } 

        function draw() { 
            ctx.clearRect(0, 0, canvas.width, canvas.height); 
            
            const cx = canvas.width / 2; 
            const cy = canvas.height / 2; 

            ctx.font = "bold 12px Arial"; 
            ctx.textAlign = "center"; 
            ctx.textBaseline = "middle"; 

            // Восстановленный и исправленный цикл отрисовки
            for (let i = 0; i < NUM_STEPS; i++) {
                // angle добавляет плавное смещение слов по контуру
                let t = (i / NUM_STEPS) * Math.PI * 2 + angle;
                
                let x = cx + heartX(t) * SCALE;
                // Минус перед heartY, чтобы сердце не перевернулось (ось Y в Canvas направлена вниз)
                let y = cy - heartY(t) * SCALE; 

                // Нежно-розовый цвет с легким мерцанием за счет изменения прозрачности
                ctx.fillStyle = `rgba(255, 179, 193, ${0.7 + Math.sin(t + angle * 2) * 0.3})`;
                
                ctx.fillText(TEXT, x, y);
            }
        }

        // Функция плавной анимации
        function animate() {
            angle -= 0.01; // Скорость движения текста по контуру
            draw();
            requestAnimationFrame(animate);
        }

        // Корректное отслеживание изменения размеров экрана
        window.addEventListener("resize", () => { 
            canvas.width = window.innerWidth; 
            canvas.height = window.innerHeight; 
        });

        // Запуск
        animate();
    </script>
</body>
</html>
